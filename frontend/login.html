  // Inline Validation Helpers for Login Page
  function validateRollNoInput(input) {
    const errorSpan = document.getElementById('rollNoError');
    const pattern = /^(22|23|24|25)BD1A05[A-G][0-9]$/;
    if (!pattern.test(input.value.trim())) {
      errorSpan.textContent = 'Invalid Roll No format. Use: 23BD1A05C7';
      return false;
    } else {
      errorSpan.textContent = '';
      return true;
    }
  }

  function validateStudentPasswordInput(input) {
    const errorSpan = document.getElementById('studentPasswordError');
    if (input.value.trim() === '') {
      errorSpan.textContent = 'Password is required';
      return false;
    }
    errorSpan.textContent = '';
    return true;
  }

  function validateFacultyEmailInput(input) {
    const errorSpan = document.getElementById('facultyIdError');
    const pattern = /^[A-Za-z]{5,15}[0-9]{0,3}@gmail\.com$/;
    if (!pattern.test(input.value.trim())) {
      errorSpan.textContent = 'Format: 5-15 letters + optional digits + @gmail.com';
      return false;
    } else {
      errorSpan.textContent = '';
      return true;
    }
  }

  function validateFacultyPasswordInput(input) {
    const errorSpan = document.getElementById('facultyPasswordError');
    if (input.value.trim() === '') {
      errorSpan.textContent = 'Password is required';
      return false;
    }
    errorSpan.textContent = '';
    return true;
  }

  function validateAdminIdInput(input) {
    const errorSpan = document.getElementById('adminIdError');
    const pattern = /^[a-zA-Z0-9]{4,20}$/;
    if (!pattern.test(input.value.trim())) {
      errorSpan.textContent = 'Admin ID must be 4-20 alphanumeric characters';
      return false;
    } else {
      errorSpan.textContent = '';
      return true;
    }
  }

  function validateAdminPasswordInput(input) {
    const errorSpan = document.getElementById('adminPasswordError');
    if (input.value.trim() === '') {
      errorSpan.textContent = 'Password is required';
      return false;
    }
    errorSpan.textContent = '';
    return true;
  }

  function validateClubHeadIdInput(input) {
    const errorSpan = document.getElementById('clubheadIdError');
    const pattern = /^[A-Za-z0-9\s-]+-Head$/i;
    if (!pattern.test(input.value.trim())) {
      errorSpan.textContent = 'Invalid format. Use: Clubname-Head';
      return false;
    } else {
      errorSpan.textContent = '';
      return true;
    }
  }

  function validateClubHeadPasswordInput(input) {
    const errorSpan = document.getElementById('clubheadPasswordError');
    if (input.value.trim() === '') {
      errorSpan.textContent = 'Password is required';
      return false;
    }
    errorSpan.textContent = '';
    return true;
  }

  // Fixed login functions
function studentLogin() {
  const rollNoEl = document.getElementById("rollNo");
  const passwordEl = document.getElementById("studentPassword");
  
  rollNoEl.value = rollNoEl.value.trim();
  
  const isRollNoValid = validateRollNoInput(rollNoEl);
  const isPassValid = validateStudentPasswordInput(passwordEl);
  
  if (!isRollNoValid || !isPassValid) {
    return;
  }

  const username = rollNoEl.value;
  const password = passwordEl.value;

  fetch(API_BASE + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ role: "student", username, password })
  })
  .then(res => res.json())
  .then(data => {
    if (data.token) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("role", "student");

      const base64Url = data.token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));

      const user = JSON.parse(jsonPayload);
      localStorage.setItem("username", user.username || "Unknown");
      console.log("Logged in as:", user.name || user.username || "Unknown");

      window.location.href = "./student-dashboard.html";
    } else {
      alert(data.error);
    }
  })
  .catch(err => { console.error(err); alert("Login failed."); });
}

      body.innerHTML = `
        <p style="font-size: 13px; color: #475569; line-height: 1.5; margin-bottom: 10px; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px;">
          <i class="fas fa-info-circle" style="color: #3b82f6; margin-right: 5px;"></i>
          Submit a request to the Admin. You can also visit the Admin Office or email <strong>admin@kmit.in</strong>.
        </p>
        <div class="form-group" style="margin-bottom: 0;">
          <label style="display:block; margin-bottom:5px; font-weight:600; color:#333;">Club Head Username</label>
          <input type="text" id="forgotUsername" placeholder="e.g. Mudra-Head" required />
        </div>
        <div class="form-group" style="margin-bottom: 0;">
          <label style="display:block; margin-bottom:5px; font-weight:600; color:#333;">Contact Email</label>
          <input type="email" id="forgotContactEmail" placeholder="e.g. head@gmail.com" required />
        </div>
        <div class="form-group" style="margin-bottom: 0;">
          <label style="display:block; margin-bottom:5px; font-weight:600; color:#333;">Reason / Details (Optional)</label>
          <input type="text" id="forgotReason" placeholder="Reason for reset" />
        </div>
        <button type="button" onclick="submitResetRequest()" style="margin-top: 10px; padding: 12px; background: #3b82f6; color: #fff; font-weight: bold; border-radius: 8px; cursor: pointer; border: none;">Submit Request</button>
      `;
    }
  }

  function closeForgotModal() {
    document.getElementById("forgotPasswordModal").style.display = 'none';
  }

  function showModalMsg(text, isError = false) {
    const msg = document.getElementById("forgotModalMessage");
    msg.innerText = text;
    msg.style.display = 'block';
    if (isError) {
      msg.style.backgroundColor = '#f1f5f9';
      msg.style.color = '#475569';
      msg.style.border = '1px solid #cbd5e1';
    } else {
      msg.style.backgroundColor = '#dcfce7';
      msg.style.color = '#15803d';
      msg.style.border = '1px solid #86efac';
    }
  }

  async function requestOtp() {
    const email = document.getElementById("forgotUsername").value.trim();
    if (!email) {
      showModalMsg("❌ Email is required.", true);
      return;
    }
    
    try {
      const res = await fetch(API_BASE + "/forgot-password/request", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ role: "faculty", username: email })
      }).then(r => r.json());
      
      if (res.error) {
        showModalMsg(res.error, true);
        return;
      }
      
      facultyEmailForOtp = email;
      showModalMsg(res.message);
      
      if (res.otpSimulated) {
        alert(`[SIMULATED EMAIL SENT]\nTo: ${email}\nOTP: ${res.otpSimulated}\n\nThis OTP is also logged in the server's command terminal!`);
      }
      
      const body = document.getElementById("forgotModalBody");
      body.innerHTML = `
        <p style="font-size: 14px; color: #555; margin-bottom: 5px;">An OTP code has been logged to the server terminal. Please input it below along with your new password.</p>
        <div class="form-group" style="margin-bottom: 0;">
          <label style="display:block; margin-bottom:5px; font-weight:600; color:#333;">6-Digit OTP Code</label>
          <input type="text" id="forgotOtp" placeholder="e.g. 123456" required />
        </div>
        <div class="form-group" style="margin-bottom: 0;">
          <label style="display:block; margin-bottom:5px; font-weight:600; color:#333;">New Password</label>
          <input type="password" id="forgotNewPassword" placeholder="Minimum 10 chars, uppercase, digit, special symbol" required />
        </div>
        <button type="button" onclick="submitReset()" style="margin-top: 10px; padding: 12px; background: #1e3c72; color: #fff; font-weight: bold; border-radius: 8px; cursor: pointer; border: none;">Reset Password</button>
      `;
    } catch (err) {
      console.error(err);
      showModalMsg("❌ Connection failed.", true);
    }
  }

  async function submitResetRequest() {
    const username = document.getElementById("forgotUsername").value.trim();
    const contactEmail = document.getElementById("forgotContactEmail").value.trim();
    const reason = document.getElementById("forgotReason").value.trim();
    
    if (!username || !contactEmail) {
      showModalMsg("❌ Username/Roll Number and Contact Email are required.", true);
      return;
    }
    
    try {
      const res = await fetch(API_BASE + "/forgot-password/request-reset", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          role: forgotPasswordRole.toLowerCase(),
          username,
          contactEmail,
          reason
        })
      }).then(r => r.json());
      
      if (res.error) {
        showModalMsg(res.error, true);
        return;
      }
      
      showModalMsg(res.message || "✅ Password reset request submitted!");
      setTimeout(() => {
        closeForgotModal();
      }, 2500);
    } catch (err) {
      console.error(err);
      showModalMsg("❌ Connection failed.", true);
    }
  }

  async function submitReset() {
    const payload = { role: forgotPasswordRole.toLowerCase() };
    
    if (forgotPasswordRole === 'Faculty') {
      payload.username = facultyEmailForOtp;
      payload.otp = document.getElementById("forgotOtp").value.trim();
      payload.newPassword = document.getElementById("forgotNewPassword").value;
      if (!payload.otp || !payload.newPassword) {
        showModalMsg("❌ All fields are required.", true);
        return;
      }
    } else {
      showModalMsg("❌ Reset only available for Faculty.", true);
      return;
    }
    
    try {
      const res = await fetch(API_BASE + "/forgot-password/reset", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      }).then(r => r.json());
      
      if (res.error) {
        showModalMsg(res.error, true);
        return;
      }
      
      showModalMsg(res.message || "✅ Password reset successful!");
      setTimeout(() => {
        closeForgotModal();
      }, 2500);
    } catch (err) {
      console.error(err);
      showModalMsg("❌ Connection failed.", true);
    }
  }
</script>

<!-- Forgot Password Modal -->
<div id="forgotPasswordModal" style="display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 1100; align-items: center; justify-content: center; padding: 20px;">
  <div style="background: white; border-radius: 16px; width: 100%; max-width: 450px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; animation: slideUp 0.3s ease-out; box-sizing: border-box; text-align: left;">
    <button onclick="closeForgotModal()" style="position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 24px; color: #888; cursor: pointer; width: 30px; height: 30px; padding: 0; display: flex; align-items: center; justify-content: center;">&times;</button>
    <h3 style="color: #1e3c72; margin-bottom: 20px; font-size: 22px; font-weight: bold;" id="forgotModalTitle">Reset Password</h3>
    
    <div id="forgotModalBody" style="display: flex; flex-direction: column; gap: 16px;">
      <!-- Dynamic inputs based on role -->
    </div>
    
    <div id="forgotModalMessage" style="margin-top: 15px; font-size: 14px; display: none; padding: 10px; border-radius: 8px;"></div>
  </div>
</div>

<style>
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
</style>
</body>
</html>
